name: CI
on:
  push: {branches: [main]}
  pull_request:

env: {CARGO_TERM_COLOR: always}

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: {components: "clippy, rustfmt", targets: "wasm32-unknown-unknown"}
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # §11.5 perf gates are release-only (production numbers, not debug-build properties):
      # the ≤50 ms QSS-lap wall-clock medians + the dhat zero-alloc gate on the same kernels, plus
      # the T2 transient step's zero-alloc + throughput gates and the QSS↔T2 hull-containment parity.
      - run: cargo test --release -p outlap-qss --test catalunya --test alloc
      - run: cargo test --release -p outlap-transient --test perf_alloc --test perf_throughput --test parity_report
      - run: cargo run -p outlap-schema --bin gen_schemas -- --check   # schemas == committed
      - run: cargo build --target wasm32-unknown-unknown -p outlap-wasm --release
      - run: cargo build --target wasm32-unknown-unknown -p outlap-raceline   # clarabel is wasm-clean
      - run: cargo build --target wasm32-unknown-unknown -p outlap-tire      # tire kernels stay wasm-clean
      - run: cargo build --target wasm32-unknown-unknown -p outlap-qss       # QSS solvers stay wasm-clean (parallel feature off)
      - run: cargo build --target wasm32-unknown-unknown -p outlap-vehicle    # T2 blocks stay wasm-clean
      - run: cargo build --target wasm32-unknown-unknown -p outlap-powertrain # ERS rulebook/manager stays wasm-clean
      - run: cargo build --target wasm32-unknown-unknown -p outlap-transient  # T2 orchestration stays wasm-clean

  python:
    runs-on: ubuntu-latest
    # Build the outlap-core extension in RELEASE: g-g-g-v envelope generation (now on the default
    # t1 lap path) is a seconds-scale cold step in release but minutes in debug — a debug wheel
    # would blow the pytest/notebook time budgets. maturin honours this under PEP517 (uv sync).
    env:
      MATURIN_PEP517_ARGS: --profile release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable   # uv sync builds the outlap-core extension (maturin)
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --directory python --group notebooks --group derivations --extra tire-fit
      - run: uv run --directory python ruff check src tests
      - run: uv run --directory python ruff format --check src tests
      - run: uv run --directory python pyright                            # strict (pyproject config)
      - run: uv run --directory python pytest
      - run: uv run --directory python python -m outlap.schemas --check   # schemas in sync
      # Decision #32: re-execute the SymPy Kane derivation, regenerate the RHS fixture, and fail if it
      # drifts from the committed one — the symbolic source stays authoritative for the chassis EOM
      # (the Rust 1e-12 test `cargo test -p outlap-vehicle` checks the same fixture). Run from the
      # notebook's own dir so its `sys.path` insert finds the derivation module; `--project` selects
      # the venv without changing cwd.
      - run: cd docs/derivations && uv run --project "$GITHUB_WORKSPACE/python" jupyter execute --kernel_name python3 t2_chassis_kane.ipynb
      - run: git diff --exit-code docs/derivations/fixtures/t2_chassis_rhs.json

  notebooks:
    runs-on: ubuntu-latest
    # Split out from `python` so the fast rust/pytest feedback isn't gated behind the multi-minute
    # all-notebooks execution — the two run in parallel. Same release-built extension: g-g-g-v
    # envelope generation is a seconds-scale cold step in release but minutes in debug.
    env:
      MATURIN_PEP517_ARGS: --profile release
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable   # uv sync builds the outlap-core extension (maturin)
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --directory python --group notebooks --extra tire-fit
      # Execute every notebook headless: the tour is an end-to-end test of the whole stack,
      # and re-executing keeps the committed outputs from rotting. (Absolute paths: uv's
      # --directory also changes the command's working directory.)
      # --kernel_name pins execution to the venv's kernel, so a contributor's locally-selected
      # kernel (saved into notebook metadata by VS Code/Jupyter) can never break CI.
      - run: uv run --directory python jupyter execute --timeout 900 --kernel_name python3 "$GITHUB_WORKSPACE"/notebooks/*.ipynb

  wheels:            # release-tag only; add maturin-action matrix (linux/mac/win) when publishing
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with: {command: build, args: --release -m crates/outlap-py/Cargo.toml}
