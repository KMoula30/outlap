# SYNTHETIC drive-unit map (machine + inverter + reduction lumped at the wheel-side shaft).
schema: ptm/1.0
kind: drive_unit
axes:
  speed_rpm: [0.0, 3000.0, 6000.0, 9000.0, 12000.0]
  load_axis:
    load_fraction: [-1.0, -0.5, 0.0, 0.5, 1.0]
  torque_nm: [-400.0, -200.0, 0.0, 200.0, 400.0]
tables:
  file: tables/rear_drive_unit.parquet
  efficiency: true
  loss_w: true
limits:
  max_torque_nm_vs_speed:
    speed_rpm: [0.0, 6000.0, 12000.0]
    torque_nm: [420.0, 420.0, 210.0]
inertia_kgm2: 0.045
mass_kg: 82.0
meta:
  source: "synthetic drive unit"
  dc_voltage_v: 800.0
  upstream_ratio_applied: true
