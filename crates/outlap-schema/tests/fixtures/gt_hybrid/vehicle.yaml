# Reference topology: GT hybrid 80/20 (ICE -> gearbox -> rear diff -> RL+RR; EM in parallel as the
# ERS machine — the split ratio is data). Same block as F1, different numbers.
schema: vehicle/2.0
name: "Reference GT hybrid"
chassis:
  mass_kg: 1250.0
  cg: [1.55, 0.0, 0.34]
  inertia: [320.0, 1600.0, 1750.0]
  wheelbase_m: 2.75
  track_m: [1.68, 1.64]
aero:
  map: aero/gt.parquet
  axes: [ride_height_f_mm, ride_height_r_mm, yaw_deg]
suspension:
  model: lumped_kc
  front: { ride_rate_n_per_m: 130000.0, roll_stiffness_share: 0.56, roll_center_height_m: 0.04 }
  rear: { ride_rate_n_per_m: 140000.0, roll_stiffness_share: 0.44, roll_center_height_m: 0.07 }
tires:
  front: tyr/slick.tyr.yaml
  rear: tyr/slick.tyr.yaml
drivetrain:
  # D-M6-13 graph shape (mirrors f1_2026): ICE + MGU-K share the crank node; gearbox + diff on
  # top-level couplers. The MGU-K is governed by `policy` and force-added.
  units:
    - id: ice
      source: ptm/ice_v6.ptm.yaml
      output: crank
    - id: mguk
      source: ptm/mgu_k.ptm.yaml
      battery: gt_es
      output: crank
  couplers:
    - coupler:
        gearbox: { ratios: [2.6, 2.0, 1.6, 1.3, 1.1, 0.9], final_drive: 3.4, shift_time_s: 0.04 }
      from: crank
      to: gearbox_out
    - coupler:
        diff: { type: lsd, preload_nm: 80.0, ramp: [40.0, 65.0] }
      from: gearbox_out
      wheels: [RL, RR]
policy:
  # Exercises the OPTIONAL policy paths: no override_mode, no recharge_phases — proving the
  # Option-handling stays tested (D-M6-12).
  governs: [mguk]
  regulatory_window_mj: 2.0
  deployment:
    power_limit_kw: 120.0
    taper_vs_speed:
      speed_kph: [0.0, 250.0, 320.0]
      power_frac: [1.0, 0.8, 0.0]
  recovery:
    braking_power_limit_kw: 120.0
    per_lap_harvest_mj: 3.0
batteries:
  gt_es:
    model: rc_pairs
    params: battery/gt_es.yaml
brakes:
  balance_bar: 0.6
  disc:
    front: { thermal_capacity_j_per_k: 52000.0, cooling_area_m2: 0.13 }
    rear: { thermal_capacity_j_per_k: 40000.0, cooling_area_m2: 0.10 }
  regen_blend: { max_regen_frac: 0.45 }
