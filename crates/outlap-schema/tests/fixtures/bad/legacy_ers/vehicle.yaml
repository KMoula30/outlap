# Negative fixture (D-M6-13): the pre-2.0 singleton `ers:` layout — the legacy sniff must reject it
# with a curated pointer to the drivetrain.units[]/policy:/batteries: shape (there is no migrate).
schema: vehicle/2.0
name: "legacy ers layout"
chassis:
  mass_kg: 768.0
  cg: [1.70, 0.0, 0.30]
  inertia: [180.0, 950.0, 1000.0]
  wheelbase_m: 3.40
  track_m: [1.65, 1.60]
aero:
  map: aero/x.parquet
  axes: [ride_height_f_mm, ride_height_r_mm, yaw_deg]
suspension:
  model: lumped_kc
  front: { ride_rate_n_per_m: 220000.0, roll_stiffness_share: 0.58, roll_center_height_m: 0.03 }
  rear: { ride_rate_n_per_m: 240000.0, roll_stiffness_share: 0.42, roll_center_height_m: 0.06 }
tires:
