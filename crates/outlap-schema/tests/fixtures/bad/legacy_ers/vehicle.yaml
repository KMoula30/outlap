    power_limit_kw: 350.0
    taper_vs_speed: { speed_kph: [0.0, 345.0], power_frac: [1.0, 0.0] }
  recovery: { braking_power_limit_kw: 350.0, per_lap_harvest_mj: 8.5 }
brakes:
  balance_bar: 0.58
  disc:
    front: { thermal_capacity_j_per_k: 60000.0, cooling_area_m2: 0.14 }
    rear: { thermal_capacity_j_per_k: 48000.0, cooling_area_m2: 0.11 }
