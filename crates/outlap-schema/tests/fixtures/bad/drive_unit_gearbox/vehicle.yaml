# SPDX-License-Identifier: CC-BY-SA-4.0
# A lumped `drive_unit` .ptm sitting behind a gearbox — must fail the topology check.
schema: vehicle/2.0
name: "drive unit behind gearbox"
chassis:
  mass_kg: 1650.0
  cg: [1.35, 0.0, 0.42]
  inertia: [520.0, 2300.0, 2500.0]
  wheelbase_m: 2.90
  track_m: [1.62, 1.60]
aero:
  map: aero/x.parquet
  axes: [ride_height_f_mm, ride_height_r_mm, yaw_deg]
suspension:
  model: lumped_kc
  front: { ride_rate_n_per_m: 45000.0, roll_stiffness_share: 0.55, roll_center_height_m: 0.05 }
  rear: { ride_rate_n_per_m: 52000.0, roll_stiffness_share: 0.45, roll_center_height_m: 0.08 }
tires:
  front: tyr/slick.tyr.yaml
  rear: tyr/slick.tyr.yaml
drivetrain:
  units:
    - source: ptm/rear_drive_unit.ptm.yaml
      id: du
      path:
        - gearbox:
            ratios: [8.0]
            final_drive: 1.0
            shift_time_s: 0.0
        - diff: { type: open }
      wheels: [RL, RR]
brakes:
  balance_bar: 0.62
  disc:
    front: { thermal_capacity_j_per_k: 42000.0, cooling_area_m2: 0.09 }
    rear: { thermal_capacity_j_per_k: 34000.0, cooling_area_m2: 0.07 }
