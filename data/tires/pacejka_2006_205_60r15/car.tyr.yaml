# SPDX-License-Identifier: CC-BY-SA-4.0
# Pacejka Magic Formula reference tyre — 205/60R15 91V passenger car at 2.2 bar (ISO sign).
#
# MF coefficients transcribed VERBATIM from the published book table (coefficient values are
# facts, not copyrightable expression):
#   H. B. Pacejka, "Tyre and Vehicle Dynamics", 2nd ed. (2006), Appendix 3, Table A3.1.
#
# Edition notes (see README.md):
#  - 2nd-edition set: there are NO Besselink inflation-pressure terms (PP*), so pressure has no
#    effect in the model; NOMPRES is recorded for reference only.
#  - Mx (overturning) is modelled as zero for this tyre (the book's QSX1..3 are all 0), so the
#    QSX* family is omitted.
#  - My (rolling resistance) uses only the qsy1 coefficient the book lists (0.01).
#  - Scaling factors L* are all unity (not tabulated) and therefore omitted.
#  - thermal/wear blocks are SYNTHETIC placeholders (those models land in M5); the load-bearing
#    force/moment coefficients are the published measured set.
schema: tyr/1.0
mf61:
