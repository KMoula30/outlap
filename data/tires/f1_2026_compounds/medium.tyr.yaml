# SPDX-License-Identifier: CC-BY-SA-4.0
# SYNTHETIC compound preset — MEDIUM (the baseline). Shares the generic racing-slick MF6.1 core
# (f1_2026 slick); baseline peak grip (LMU=1.0), the reference thermal window, and the calibrated
# racing-slick wear/cliff block (outlap.wearcal, M5 PR7/PR8). This is identical in spirit to the
# f1_2026 default slick. Not measured data.
schema: tyr/1.0
mf61:
  FNOMIN: 4000.0
  UNLOADED_RADIUS: 0.33
  PCX1: 1.65
  PDX1: 1.75
  PEX1: 0.10
  PKX1: 22.0
  PCY1: 1.40
  PDY1: 1.68
  PEY1: -1.0
  PKY1: -20.0
  RBX1: 13.0
  RBY1: 9.0
  LMUX: 1.0
  LMUY: 1.0
thermal:
  c_s: 8000.0
  c_c: 22000.0
  c_g: 1500.0
  g_sc: 90.0
  g_cg: 40.0
  g_road: 250.0
  h0: 15.0
  h1: 5.5
  p_t: 0.65
  t_opt: 95.0
  c_t: 2.2
  k_c: 0.0015
  t_c_ref: 80.0
  p_cold: 138.0
  t_cold: 20.0
wear:
  # Baseline calibrated racing-slick wear/cliff (M5 PR7/PR8): gradual ~0.1→3 mm wear with a cliff
  # as the tread crosses w_c near mid-stint.
  k_w: 4.4e-9
  w_max: 8.0
  w_c: 2.0
  tau_d: 600.0
  t_deg: 120.0
  delta_t_ref: 20.0
  beta: 2.0
  delta_c: 0.12
  s_w: 0.5
  delta_d: 0.30
provenance:
  citation: "Pacejka, Tire and Vehicle Dynamics, 3rd ed. (2012)"
  source: "synthetic medium-compound preset — generic racing-slick MF6.1 core at baseline peak grip; thermal/wear inverse-calibrated by outlap.wearcal (M5 PR7/PR8), medium class"
  synthetic: true
