# SPDX-License-Identifier: CC-BY-SA-4.0
# Reference topology: F1 2026 hybrid (ICE + MGU-K on the same shaft -> gearbox -> rear diff -> RL+RR).
# NOTE: ERS/energy figures are approximate 2026-regulation values for testing — verify against the
# published FIA 2026 Technical Regulations before shipping this as reference data.
schema: vehicle/2.0
name: "Reference F1 2026 hybrid"
chassis:
  # DRY mass = car + driver, no fuel (the 2026 ≤768 kg minimum-mass convention); the race fuel
  # ADDS on top via the `fuel:` block below, so the full-tank start mass is 768 + 80 = 848 kg
  # (M6/PR5, D-M6-4a). cg is the DRY centre of gravity; the tank centroid offset migrates it.
  mass_kg: 768.0
  cg: [1.70, 0.0, 0.30]
  inertia: [180.0, 950.0, 1000.0]
  wheelbase_m: 3.40
  track_m: [1.65, 1.60]
aero:
  map: aero/f1_2026.parquet
  axes: [ride_height_f_mm, ride_height_r_mm, yaw_deg, drs_flag]
  # SYNTHETIC constant-coefficient fallback (Locked Decision #15) — used by the T0 point-mass tier
  # until the ride-height aero map is consumed (T1). CALIBRATED to 2026 Barcelona GP telemetry
  # (FastF1, HAM fastest lap + 143 pooled corner apexes): total CzA 5.5 m² reproduces the measured
  # lateral-g rise with speed (~2.1 g @ 99 km/h → ~4.5 g @ 229 km/h; the downforce signature — a
  # 3-param load-sensitive fit drove PDY2→0, i.e. constant-μ + downforce fits the data);
  # ~2.1x car-weight downforce at 250 km/h. NOT measured aero-map data.
  constant:
    cx_a_m2: 1.25
    cz_front_a_m2: 2.323
    cz_rear_a_m2: 3.178
suspension:
  model: lumped_kc
  front:
    ride_rate_n_per_m: 220000.0
    # Static (design) ride heights the aero-map platform equilibrium compresses under downforce.
    # Anchored so the equilibrium sits near the map's reference node (30 mm front / 70 mm rear),
    # where the map reproduces the constant-aero coefficients (see python/tools/gen_f1_aero.py).
    static_ride_height_m: 0.040
    roll_stiffness_share: 0.58
    roll_center_height_m: 0.03
    anti_dive: 0.4
    # T3 (14-DOF) suspension data — applied L/R-symmetrically; never estimated (a t3 assembly
    # rejects a car that omits these). Values are representative of a 2026-style front corner.
    unsprung_mass_kg: 12.0
    damper_bump_n_s_per_m: 4500.0
    damper_rebound_n_s_per_m: 9000.0
    arb_stiffness_n_m_per_rad: 160000.0
    bumpstop:
      gap_m: 0.020
      rate_n_per_m: 600000.0
  rear:
    ride_rate_n_per_m: 240000.0
    static_ride_height_m: 0.090
    roll_stiffness_share: 0.42
    roll_center_height_m: 0.06
    anti_squat: 0.3
    unsprung_mass_kg: 13.0
    damper_bump_n_s_per_m: 5000.0
    damper_rebound_n_s_per_m: 10000.0
    arb_stiffness_n_m_per_rad: 130000.0
    bumpstop:
      gap_m: 0.025
      rate_n_per_m: 650000.0
tires:
  front: tyr/slick.tyr.yaml
  rear: tyr/slick.tyr.yaml
drivetrain:
  # D-M6-13 graph shape: the ICE and the MGU-K both output onto the shared `crank` node; the
  # gearbox + diff live on top-level `couplers` from the crank down to the rear wheels. The ICE's
  # flattened chain (crank -> gearbox_out -> [RL, RR]) reproduces the old private `[gearbox, diff]`
  # path exactly, so the reduction is byte-identical. The MGU-K is governed by `policy` (below) and
  # force-added, so it is excluded from the mechanical ceilings.
  units:
    - id: ice
      source: ptm/ice_v6.ptm.yaml
      output: crank
    - id: mguk
      source: ptm/mgu_k.ptm.yaml
      battery: f1_es
      output: crank
  couplers:
    - coupler:
        gearbox:
            # 8-speed; final drive sized so 8th tops out at the 15 000 rpm limiter at ~340 km/h
            # (0.86 x 6.4 = 5.50 total; v_top = omega_max*r_wheel/5.50 = 94.2 m/s), matching the
            # ERS deployment taper that ends at 345 km/h. The shift ladder then spans
            # ~100/133/163/196/229/266/300 km/h - the full 1->8 sweep on a GP circuit.
            ratios: [2.9, 2.2, 1.8, 1.5, 1.28, 1.1, 0.98, 0.86]
            final_drive: 6.4
            shift_time_s: 0.02
      from: crank
      to: gearbox_out
    - coupler:
        diff: { type: lsd, preload_nm: 90.0, ramp: [45.0, 70.0] }
      from: gearbox_out
      wheels: [RL, RR]
policy:
  # The energy-management overlay governs the MGU-K unit. `regulatory_window_mj` is the FIA C5.2.9
  # on-track swing limit (4 MJ); the physical pack window lives on `battery/f1_es.yaml`.
  governs: [mguk]
  regulatory_window_mj: 4.0
  deployment:
    power_limit_kw: 350.0
    taper_vs_speed:
      speed_kph: [0.0, 290.0, 345.0]
      power_frac: [1.0, 1.0, 0.0]
  override_mode:
    power_limit_kw: 350.0
    taper_vs_speed:
      speed_kph: [0.0, 337.0, 355.0]
      power_frac: [1.0, 1.0, 0.0]
    extra_energy_per_lap_mj: 0.5
    activation: strategy
  recovery:
    braking_power_limit_kw: 350.0
    per_lap_harvest_mj: 8.5
    recharge_phases: true
batteries:
  f1_es:
    model: rc_pairs
    params: battery/f1_es.yaml
brakes:
  balance_bar: 0.58
  disc:
    front:
      thermal_capacity_j_per_k: 60000.0
      cooling_area_m2: 0.14
    rear:
      thermal_capacity_j_per_k: 48000.0
      cooling_area_m2: 0.11
  regen_blend:
    max_regen_frac: 0.5
# On-board fuel (§8.1, M6/PR5, D-M6-4). initial_kg ADDS on top of the dry chassis.mass_kg, so the
# car starts the race at m₀ = 848 kg and gets lighter (and faster) as the ICE burns fuel. The tank
# centroid sits 0.10 m behind + 0.05 m above the dry CG (the fuel cell behind the driver), so the CG
# migrates forward and down over a stint.
#
# NO `flow_limit:` here on purpose. The fuel-flow ceiling (C5.2.3–5) is fully wired — it shrinks the
# ICE traction envelope on power (`FuelModel::ice_power_cap_w`, `outlap-qss/src/solver.rs`) and is
# exercised by `outlap-qss/tests/fuel.rs::flow_limit_binds_on_power_and_the_burn_respects_the_ceiling`
# with a synthetic tight cap. But this car's ICE `.ptm` map is ALREADY calibrated to realistic 2026
# (fuel-flow-limited) pace, so a separate flat cap would DOUBLE-COUNT the restriction and over-slow
# the lap. Declare a `flow_limit` only alongside an *unrestricted* ICE map. (M6/PR5, D-M6-5.)
fuel:
  initial_kg: 80.0
  tank_kg: 110.0
  cg_offset_m: [-0.10, 0.05]
  lhv_j_per_kg: 43.0e6
