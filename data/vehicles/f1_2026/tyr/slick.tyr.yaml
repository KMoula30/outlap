# SYNTHETIC tire dataset — physically plausible, not measured. Generation: hand-authored MF6.1
# core coefficients for a generic racing slick, for schema/round-trip testing only.
schema: tyr/1.0
mf61:
  FNOMIN: 4000.0
  UNLOADED_RADIUS: 0.33
  PCX1: 1.65
  # Peak friction CALIBRATED to 2026 Barcelona GP telemetry (FastF1): the real car's reverse-
  # engineered lateral grip envelope (v²·κ from position data, 143 pooled corner apexes) peaks at
  # ~4.5 g in fast corners — a physical F1-slick peak μ of ~1.68 (was 1.25, ~2× too low), the level
  # set by the low-speed apexes and the downforce (CzA) by the a_lat-vs-speed rise. PDX1 scaled to
  # keep the friction-ellipse shape. Still SYNTHETIC (not a measured tyre file).
  PDX1: 1.750
  PEX1: 0.10
  PKX1: 22.0
  PCY1: 1.40
  PDY1: 1.680
  PEY1: -1.0
  PKY1: -20.0
  # Combined-slip weighting (Pacejka 4.E50-4.E67): book-magnitude SYNTHETIC values (same status as
  # the rest of this file). Without them the MF6.1 defaults (RBX1 = RBY1 = 0) silently disable the
  # friction-circle interaction, leaving an unphysical rectangular combined boundary.
  RBX1: 13.0
  RBY1: 9.0
  LMUX: 1.0
  LMUY: 1.0
thermal:
  c_s: 8000.0
  c_c: 22000.0
  c_g: 1500.0
  g_sc: 90.0
  g_cg: 40.0
  g_road: 250.0
  h0: 15.0
  h1: 5.5
  p_t: 0.65
  t_opt: 95.0
  c_t: 2.2
  k_c: 0.0015
  t_c_ref: 80.0
  p_cold: 138.0
  t_cold: 20.0
wear:
  # CALIBRATED (racing-slick "medium" band, M5 PR7/PR8): k_w + cliff recovered by outlap.wearcal
  # from a representative medium-compound stint-decay curve. Distinct soft/medium/hard compound
  # presets live in data/tires/f1_2026_compounds/; this default slick is the medium baseline.
  k_w: 4.4e-9
  w_max: 8.0
  w_c: 2.0
  tau_d: 600.0
  t_deg: 120.0
  delta_t_ref: 20.0
  beta: 2.0
  delta_c: 0.12
  s_w: 0.5
  delta_d: 0.30
provenance:
  citation: "Pacejka, Tire and Vehicle Dynamics, 3rd ed. (2012)"
  source: "synthetic generic racing slick (MF6.1 core); thermal ring physically-plausible (M5 PR1); wear/cliff inverse-calibrated by outlap.wearcal from a medium stint-decay curve (M5 PR7/PR8)"
  synthetic: true
