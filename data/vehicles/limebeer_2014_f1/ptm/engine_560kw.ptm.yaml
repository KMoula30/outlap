# PL2014 powertrain as a wheel-shaft peak-torque envelope: tau(omega) = min(5000 N*m, P/omega) with
# P = 560 kW. The engine power is NOT stated in the VSD 52(5) manuscript; 560 kW is the value the
# authors use for the same car in the companion work (Perantoni doctoral thesis, "Optimal control
# of vehicle systems": "the peak engine power of 560 kW is capable of supporting a top speed of
# 85.4 m/s") and is consistent with the paper's Fig. 8 top speed (~88 m/s with drag CdA = 1.35 m2,
# rho = 1.2: P = 0.5*rho*CdA*u^3 = 560 kW at 88.4 m/s). The 5000 N*m low-speed cap is a plain
# torque bound chosen safely above the tyre traction limit (the launch is grip-limited, matching
# the paper's tyre-limited drive). See README.md.
schema: ptm/1.0
kind: drive_unit
axes:
  speed_rpm: [0.0, 2900.0]
  load_axis: { torque_nm: [0.0, 5000.0] }
  torque_nm: [0.0, 5000.0]
tables:
  file: tables/none.parquet            # no efficiency/loss tables: PL2014 has no energy accounting
limits:
  max_torque_nm_vs_speed:
    speed_rpm: [0.0, 200.0, 400.0, 600.0, 800.0, 1000.0, 1069.0, 1100.0, 1200.0, 1300.0, 1400.0,
                1500.0, 1600.0, 1700.0, 1800.0, 1900.0, 2000.0, 2100.0, 2200.0, 2300.0, 2400.0,
                2500.0, 2600.0, 2700.0, 2800.0, 2900.0]
    torque_nm: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 4861.5, 4456.3, 4113.5,
                3819.7, 3565.1, 3342.3, 3145.7, 2970.9, 2814.5, 2673.8, 2546.5, 2430.7, 2325.0,
                2228.2, 2139.0, 2056.8, 1980.6, 1909.9, 1844.0]
inertia_kgm2: 0.05
mass_kg: 100.0
meta: { upstream_ratio_applied: false }
