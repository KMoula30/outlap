# SYNTHETIC Model-3-scale drive unit (small: 1365 N·m / ≈100 kW peak at the
# output shaft) — one of the three sizing-sensitivity variants of the HV (800 V-class) study.
# NOT measured data and NOT derived from any PDT export (firewall; M3 user decision #7).
# Regenerate with: python python/tools/gen_model3_powertrain.py
schema: ptm/1.1
kind: drive_unit
axes:
  speed_rpm: [10.000, 340.000, 670.000, 1000.000, 1330.000, 1660.000, 1990.000]
  load_axis:
    torque_nm: [-819.000, -614.250, -409.500, -204.750, 0.000, 170.625, 341.250, 682.500, 1023.750, 1365.000]
  torque_nm: [-819.000, -614.250, -409.500, -204.750, 0.000, 170.625, 341.250, 682.500, 1023.750, 1365.000]
  vdc_v: [730.000, 790.000, 850.000]
tables:
  # Sidecar next to this YAML (the PDT-importer convention).
  file: du_small.maps.parquet
  efficiency: true
  loss_w: true
limits:
  max_torque_nm_vs_speed:
    speed_rpm: [10.000, 340.000, 670.000, 1000.000, 1330.000, 1660.000, 1990.000]
    torque_nm: [1365.000, 1365.000, 1365.000, 955.500, 718.421, 575.602, 480.151]
inertia_kgm2: 1.1
mass_kg: 65.0
meta:
  source: synthetic Model-3-scale drive unit (gen_model3_powertrain.py) — ESTIMATED
  dc_voltage_v: 790.0
  upstream_ratio_applied: true
