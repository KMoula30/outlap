# git-cliff changelog configuration (Conventional Commits → keep-a-changelog).
# Regenerate: git cliff --tag v0.1.0 -o CHANGELOG.md
[changelog]
header = """
# Changelog

All notable changes to outlap are documented here. This project follows
[Conventional Commits](https://www.conventionalcommits.org) and
[Semantic Versioning](https://semver.org).\n
"""
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^docs", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^test", group = "Testing" },
  { message = "^chore", group = "Miscellaneous" },
]
protect_breaking_commits = true
tag_pattern = "v[0-9]*"
